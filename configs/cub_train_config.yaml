# ==============================================================================
# Model Training Configuration for Attention-CBM Pipeline (CUB-200-2011 Dataset)
# ==============================================================================

# 1. Vision Backbone Settings
backbone:
  backbone_type: "timm"
  backbone_name: "vit_base_patch14_dinov2"
  freeze_backbone: false
  freeze_head: false
  use_lora: true          # Enables Low-Rank Adaptation (LoRA) for parameter-efficient tuning
  lora_r: 16             # LoRA rank dimension
  lora_alpha: 16.0        # LoRA scaling factor alpha
  use_cosine_attention: false  # L2 Cosine Attention for DINOv2 border-patch suppression (experimental, default: off)
  use_group_broadcasting: false  # GroupToConceptAttention: 28 groups → 312 independent BCE classifiers
  use_dino_mask: false     # Use DINOv2 self-attention silhouette foreground masking
  dino_mask_threshold: 0.35

# 2. Dataset Setup
dataset:
  dataset: "cub"
  csv_path: "data/CUB_200_2011/images.txt"
  image_dir: "data/CUB_200_2011/images"
  concept_config_path: "data/CUB_200_2011/concept_config.json"
  # use_concept_groups: true  # Toggle Mutually Exclusive Group-level Softmax and group concept loss
  use_concept_groups: ["has_bill_shape", "has_bill_length", "has_eye_color", "has_leg_color"]
  filter_rare_concepts: true  # Automatically filter out sparse concepts whose global occurrence frequency is < 1%

# 3. Core Training Hyperparameters
training:
  phase1_epochs: 30
  phase2_epochs: 30
  phase3_epochs: 10
  batch_size: 64  # Optimized for GPU memory & in-memory cache scaling
  lambda_c: 0.1  # Scale factor for concept loss
  l1_lambda: 0.02  # L1 Lasso Regularization for Phase 2 classifier head
  use_nam_head: true  # Toggle Gated Sparse NAM Head (instead of standard nn.Linear)
  nam_hidden_dim: 8  # Hidden dimension for parallel NAM sub-networks
  l1_warmup_epochs: 10  # Number of warm-up epochs for L1 sparsity to prevent early gating collapse
  phase2_dropout: 0.5  # Apply weaker dropout (p=0.05 instead of default 0.2) in Phase 2 for training stability
  
  # 🧪 Label Smoothing for Phase 1 Concept training
  # Restricts logit magnitudes to prevent overconfidence and align with TTI.
  phase1_label_smoothing: 0.05
  
  # 🛠️ Scheduled Sampling (Noise Injection) for Phase 2 Classifier training
  # Prevents co-adaptation and shortcut learning to prediction noise.
  phase2_scheduled_sampling: true
  scheduled_sampling_prob: 0.3
  scheduled_sampling_epsilon: 0.05
  latent_concepts: 20  # Number of unsupervised latent concepts to append to the bottleneck
  num_classes: 200  # 200 unique bird species
  use_dynamic_threshold: true  # Dynamic validation thresholding optimization
  save_dir: "checkpoints"
  resume_checkpoint: null
  use_wandb: true  # Disable by default for local execution, set to true to monitor via wandb
  num_workers: 16
  pin_memory: true
  cache_in_memory: true  # Enables full RAM-caching for ultra-fast disk I/O
  max_cache_size_gb: 15.0
  run_eval: true
  run_app: false

# 4. Optimizer Configurations
optimizer:
  type: "adamw"
  backbone_lr: 0.00001  # Differential LR
  phase1_lr: 0.0005
  phase2_lr: 0.0005  # Larger LR for latent representation learning in Phase 2
  weight_decay: 0.05
  concept_loss_type: "focal"  # Choices: ["focal", "bce"]
  # focal_alpha: "dynamic"  # Dynamically computed for each concept based on negative/positive ratio
  focal_alpha: 0.95
  focal_gamma: 2.5  # Focal loss focus exponent gamma
  ortho_lambda: 0.0  # Orthogonality loss coefficient to force attention map separation

scheduler:
  phase1_type: "cosine_with_warmup" 
  phase1_warmup_epochs: 5
  phase1_eta_min: 0.000001
  phase2_type: "reduce_on_plateau"  # [추가] Phase 2는 널뛰기를 잡기 위해 Plateau 스케줄러 도입
  phase2_patience: 3
  phase2_factor: 0.5

# 6. Early Stopping Criteria
early_stopping:
  enabled: true
  phase1_monitor: "val_concept_balanced_acc"
  phase1_patience: 5
  phase2_monitor: "val_acc"
  phase2_patience: 10  # Longer patience for Phase 2 target learning
  min_delta: 0.001
