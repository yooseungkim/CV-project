# ==============================================================================
# Model Training Configuration for Attention-CBM Pipeline (CUB-200-2011 Dataset)
# ==============================================================================

# 1. Vision Backbone Settings
backbone:
  backbone_type: "timm"
  backbone_name: "resnet50"
  freeze_backbone: false
  freeze_head: false

# 2. Dataset Setup
dataset:
  dataset: "cub"
  csv_path: "data/CUB_200_2011/images.txt"
  image_dir: "data/CUB_200_2011/images"
  concept_config_path: "data/CUB_200_2011/concept_config.json"

# 3. Core Training Hyperparameters
training:
  phase1_epochs: 15
  phase2_epochs: 50
  batch_size: 64  # Optimized for GPU memory & in-memory cache scaling
  lambda_c: 0.1  # Scale factor for concept loss
  l1_lambda: 0.0001  # L1 Lasso Regularization for Phase 2 classifier head
  latent_concepts: 5  # Number of unsupervised latent concepts to append to the bottleneck
  num_classes: 200  # 200 unique bird species
  save_dir: "checkpoints"
  resume_checkpoint: null
  use_wandb: false  # Disable by default for local execution, set to true to monitor via wandb
  num_workers: 16
  pin_memory: true
  cache_in_memory: true  # Enables full RAM-caching for ultra-fast disk I/O
  max_cache_size_gb: 15.0

# 4. Optimizer Configurations
optimizer:
  type: "adamw"
  backbone_lr: 0.00001  # Differential LR
  phase1_lr: 0.0001
  phase2_lr: 0.01  # Larger LR for latent representation learning in Phase 2
  weight_decay: 0.0001
  concept_loss_type: "focal"  # Choices: ["focal", "bce"]
  focal_alpha: "dynamic"  # Dynamically computed for each concept based on negative/positive ratio
  focal_gamma: 2.0  # Focal loss focus exponent gamma

# 5. Learning Rate Scheduler Options
scheduler:
  type: "cosine"
  eta_min: 0.000001

# 6. Early Stopping Criteria
early_stopping:
  enabled: true
  phase1_monitor: "val_concept_loss"
  phase1_patience: 5
  phase2_monitor: "val_target_loss"
  phase2_patience: 10  # Longer patience for Phase 2 target learning
  min_delta: 0.001
