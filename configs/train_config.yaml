# ==============================================================================
# Model Training Configuration for Attention-CBM Pipeline (Optimized)
# ==============================================================================

# 1. Backbone Network Settings
backbone:
  # Backbone source. Choices: ["timm", "clip"]
  backbone_type: "timm"
  
  # Specific model name from timm. Examples: "resnet18", "resnet50", "convnext_base", "efficientnet_b0"
  backbone_name: "resnet50"
  
  # Freeze pre-trained vision backbone weights to train only the attention bottleneck (true/false)
  freeze_backbone: false
  
  # Freeze final classification head weights (true/false)
  freeze_head: false
  
  use_concept_attention: false  # Patch token based Cross-Attention (instead of GAP/MLP)

# 2. Dataset Setup
dataset:
  # Dataset identifier. Choices: ["milk10k", "derm7pt"]
  dataset: "milk10k"
  
  # Path to metadata CSV. If null, uses the dataset's default training metadata.
  csv_path: null
  
  # Directory containing images. If null, uses the dataset's default image folder.
  image_dir: null
  
  # Path to concept configuration JSON for bottleneck mapping. If null, auto-detects concepts.
  concept_config_path: "data/MILK10K/concept_config.json"

# 3. Core Training Hyperparameters
training:
  # Total number of epochs to train (Optimized: slightly increased since backbone LR is low)
  epochs: 30
  
  # Batch size for dataloaders
  batch_size: 64
  
  # Loss balancing weight for concepts (Optimized: raised to strongly enforce concept bottleneck learning)
  lambda_c: 0.1
  
  # Apply weaker dropout (p=0.05 instead of default 0.2) in Phase 2 for training stability
  phase2_dropout: 0.05
  
  # 🧠 Advanced Architectural & Sparsity settings
  l1_lambda: 0.02  # L1 Lasso Regularization for Phase 2 classifier head
  use_nam_head: false  # Toggle Gated Sparse NAM Head (instead of standard nn.Linear)
  nam_hidden_dim: 8  # Hidden dimension for parallel NAM sub-networks
  l1_warmup_epochs: 5  # Number of warm-up epochs for L1 sparsity to prevent early gating collapse
  use_gated_nam: false  # Gated Sparse NAM head activation
  use_pairwise_nam: false  # NAM^2 (Pairwise Interaction) activation
  use_probabilistic_cbm: false  # Deterministic to Probabilistic Concept bottleneck VAE-style transition
  l1_lambda_gate: 0.01  # L1 Regularization strength on gates
  weight_decay_nam: 1e-2  # L2 Penalty for NAM sub-networks smoothing
  
  # 🧪 Label Smoothing for Phase 1 Concept training
  # Restricts logit magnitudes to prevent overconfidence and align with TTI.
  phase1_label_smoothing: 0.05
  
  # 🛠️ Scheduled Sampling (Noise Injection) for Phase 2 Classifier training
  # Prevents co-adaptation and shortcut learning to prediction noise.
  phase2_scheduled_sampling: false
  scheduled_sampling_prob: 0.3
  scheduled_sampling_epsilon: 0.05
  
  # Penalty multiplier for binary classification (BCEWithLogitsLoss pos_weight).
  # Only used when num_classes: 1. Ignored for multi-class.
  # target_pos_weight: 5.0
  
  # Number of classification target classes. Use 1 for binary, 11 for MILK10K multi-class.
  num_classes: 11
  
  # Directory to save trained model weights
  save_dir: "checkpoints"
  
  # Optimize validation concept decision thresholds via Youden's J statistic
  use_dynamic_threshold: true
  
  # Path to pre-trained model weights (.pth) to resume or fine-tune from. Set null to train from scratch.
  resume_checkpoint: null
  
  # Whether to log runs and visualize attention heatmaps to Weights & Biases (true/false)
  use_wandb: true
  
  # Number of worker threads for loading data. Set to 4 or 8 depending on CPU cores.
  num_workers: 16
  
  # Pin memory in DataLoader for faster GPU transfer (true/false)
  pin_memory: true
  
  # Cache all samples in RAM before training. Eliminates disk I/O during epoch iteration.
  # Only activates if dataset is smaller than max_cache_size_gb. (true/false)
  cache_in_memory: true
  
  # Maximum dataset size (on-disk images) allowed for in-memory caching (in GB).
  max_cache_size_gb: 10.0

# 4. Optimizer Configurations
optimizer:
  # Optimizer type. Choices: ["adam", "adamw", "sgd"]
  type: "adamw"
  
  # Backbone fine-tuning learning rate (Differential LR)
  backbone_lr: 0.00001
  
  # Main attention & classifier heads learning rate
  head_lr: 0.001
  
  # L2 regularization weight decay
  weight_decay: 0.0001
  
  # Momentum (only applicable when optimizer type is "sgd")
  momentum: 0.9

# 5. Learning Rate Scheduler Options
scheduler:
  # Scheduler type. Choices: ["none", "cosine", "step", "plateau"]
  type: "cosine"
  
  # parameters for "cosine" (CosineAnnealingLR) - matched with T_max epochs
  T_max: 30
  eta_min: 0.000001
  
  # parameters for "step" (StepLR)
  step_size: 10
  gamma: 0.1
  
  # parameters for "plateau" (ReduceLROnPlateau)
  patience: 3
  factor: 0.1

# 6. Early Stopping Criteria
early_stopping:
  # Enable early stopping to prevent overfitting (true/false)
  enabled: true
  
  # Target validation metric to monitor.
  # Optimized: "val_target_loss" is highly effective to detect overfitting early during backbone fine-tuning.
  monitor: "val_target_loss"
  
  # Number of epochs to wait for improvement before stopping (Optimized: increased patience for slow initial convergence)
  patience: 7
  
  # Minimum delta change to qualify as an improvement
  min_delta: 0.001
