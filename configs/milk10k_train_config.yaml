# ==============================================================================
# Model Training Configuration for Attention-CBM Pipeline (MILK10K Dataset)
# ==============================================================================

# 1. Vision Backbone Settings
backbone:
  backbone_type: "timm"
  backbone_name: "vit_base_patch14_dinov2"
  freeze_backbone: false
  freeze_head: false
  use_lora: true          # Enables Low-Rank Adaptation (LoRA) for parameter-efficient tuning
  lora_r: 16             # LoRA rank dimension
  lora_alpha: 16.0        # LoRA scaling factor alpha
  use_cosine_attention: false  # L2 Cosine Attention for suppression
  use_group_broadcasting: false  # GroupToConceptAttention
  use_concept_attention: true  # Patch token based Cross-Attention (instead of GAP/MLP)

# 2. Dataset Setup
dataset:
  dataset: "milk10k"
  csv_path: "data/MILK10K/MILK10k_Training_Metadata.csv"
  image_dir: "data/MILK10K/MILK10k_Training_Input/MILK10k_Training_Input"
  concept_config_path: "data/MILK10K/concept_config.json"
  use_concept_groups: true  # Disable GroupSoftmax to let independent BCE mapping work

# 3. Core Training Hyperparameters
training:
  phase1_epochs: 30
  phase2_epochs: 50
  phase3_epochs: 0  # Joint end-to-end parameter tuning
  batch_size: 64  # Optimized for MILK10K split sizes
  lambda_c: 0.1  # Scale factor for concept loss
  l1_lambda: 0.02  # L1 Lasso Regularization for Phase 2 classifier head (with Sparsity)
  use_nam_head: true  # Toggle Gated Sparse NAM Head (instead of standard nn.Linear)
  nam_hidden_dim: 8  # Hidden dimension for parallel NAM sub-networks
  l1_warmup_epochs: 5  # Number of warm-up epochs for L1 sparsity to prevent early gating collapse
  use_gated_nam: true  # Gated Sparse NAM head activation
  use_pairwise_nam: true  # NAM^2 (Pairwise Interaction) activation
  use_probabilistic_cbm: true  # Deterministic to Probabilistic Concept bottleneck VAE-style transition
  pcbm_beta: 0.001              # Target weight coefficient beta for KL penalty
  pcbm_beta_warmup_epochs: 5   # Number of epochs for KL beta warm-up (beta = 0.0)
  pcbm_beta_anneal_epochs: 5   # Number of epochs for KL beta linear annealing/ramp-up
  pcbm_beta_min: 0.0001         # Starting KL beta value after warm-up
  pcbm_asymmetric_kl_weight: 0.1 # Weight multiplier for positive samples to avoid Gamma Trap / positive suppression
  l1_lambda_gate: 0.01  # L1 Regularization strength on gates
  weight_decay_nam: 1e-2  # L2 Penalty for NAM sub-networks smoothing
  use_cb_loss: true     # Use CVPR 2019 Class-Balanced Loss weighting
  cb_beta: 0.999
  
  # 🧪 Label Smoothing for Phase 1 Concept training
  # Restricts logit magnitudes to prevent overconfidence and align with TTI.
  phase1_label_smoothing: 0.05
  
  # 🛠️ Scheduled Sampling (Noise Injection) for Phase 2 Classifier training
  # Prevents co-adaptation and shortcut learning to prediction noise.
  phase2_scheduled_sampling: true
  scheduled_sampling_prob: 0.3
  scheduled_sampling_epsilon: 0.05
  latent_concepts: 15  # Number of unsupervised latent concepts to append to the bottleneck
  latent_penalty_scale: 4.0
  num_classes: 11  # 11 unique diagnoses in MILK10K
  use_dynamic_threshold: true  # Dynamic validation thresholding optimization
  save_dir: "checkpoints"
  resume_checkpoint: null
  use_wandb: true  # Set to true if monitoring via wandb is desired
  num_workers: 16
  pin_memory: true
  cache_in_memory: true  # Enables full RAM-caching for ultra-fast disk I/O
  max_cache_size_gb: 10.0
  run_eval: true
  run_app: false

# 4. Optimizer Configurations
optimizer:
  type: "adamw"
  backbone_lr: 0.00001  # Differential LR
  phase1_lr: 0.0005
  phase2_lr: 0.001  # Larger LR for latent representation learning in Phase 2
  phase3_lr: 0.00001  # Small joint learning rate for end-to-end Phase 3 tuning
  weight_decay: 0.05
  concept_loss_type: "asl"  # Choices: ["focal", "bce"]
  asl_gamma_pos: 0.0    # positive decay 제거 → 강한 gradient 유지
  asl_gamma_neg: 3.0    # easy negative gradient noise 강력 억제
  asl_alpha_pos: 2.0   # positive 샘플에 static weight 부여
  asl_clip: 0.05 

# 5. Learning Rate Scheduler Options
scheduler:
  type: "cosine_with_warmup"
  warmup_epochs: 3
  eta_min: 0.000001

# 6. Early Stopping Criteria
early_stopping:
  enabled: true
  phase1_monitor: "val_concept_f1"
  phase1_patience: 5
  phase2_monitor: "val_joint_loss"
  phase2_patience: 7
  phase3_monitor: "val_acc"
  phase3_patience: 5
  min_delta: 0.001
